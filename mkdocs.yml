site_name: Cyber & Chill Wiki
site_url: https://Cyber-and-Chill.github.io/wiki/
site_description: Wiki collaboratif d'informatique et de cybersécurité
repo_url: https://github.com/Cyber-and-Chill/wiki
repo_name: Cyber & Chill Wiki

theme:
  name: material
  language: fr
  logo : assets/logo.png
  favicon: assets/logo.png
  repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mode clair
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Mode sombre
  features:
    - navigation.tabs          # Onglets en haut
    - navigation.sections
    - navigation.top           # Bouton retour
    - search.highlight
    - search.suggest
    - content.code.copy        # Bouton copier le code

nav:
  - Accueil: index.md

  - Informatique:
      - Systèmes:
          - Linux: informatique/systemes/linux/coming_soon.md
          - Windows: informatique/systemes/windows/coming_soon.md

      - Réseaux:
          - Bases: informatique/reseaux/bases/coming_soon.md
          - Protocoles: informatique/reseaux/protocoles/coming_soon.md

      - Développement:
          - Git: informatique/developpement/git/coming_soon.md
          - Python: informatique/developpement/python/coming_soon.md

  - Cybersécurité:
      - Fondamentaux: cybersecurite/fondamentaux/coming_soon.md
      - OSINT: cybersecurite/osint/coming_soon.md

  - Outils:
      - Page en construction: outils/coming_soon.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - tables

plugins:
  - search:
      lang: fr